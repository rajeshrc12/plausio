services:
  postgres:
    image: postgres:16-alpine
    container_name: postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: plausio
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d plausio"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  migrate:
    build:
      context: upload-service
      dockerfile: Dockerfile
    env_file:
      - upload-service/.env
    depends_on:
      postgres:
        condition: service_healthy
    command: npx prisma migrate deploy
    restart: "no"

  upload-service:
    build:
      context: upload-service
      dockerfile: Dockerfile
    container_name: upload-service
    ports:
      - "3000:3000"
    env_file:
      - upload-service/.env
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  transcode-service:
    build:
      context: transcode-service
      dockerfile: Dockerfile
    container_name: transcode-service
    ports:
      - "3001:3001"
    env_file:
      - transcode-service/.env
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

volumes:
  postgres_data:
